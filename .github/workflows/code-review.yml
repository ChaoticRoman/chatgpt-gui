name: Code Review

on:
  pull_request:
    branches: [ main ]

jobs:
  skip-review:
    uses: ChaoticRoman/phrase-in-pr-description/.github/workflows/detect.yml@v2
    with:
      phrase: 'skip[-_ ]review'

  code-review:
    needs: skip-review
    if: "!needs.skip-review.outputs.detected"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: ChaoticRoman/gpt-code-review-action@v12
        with:
          openai-key: ${{ secrets.OPENAI_API_KEY }}
          max-length: 50000
          model: gpt-5.2-codex
