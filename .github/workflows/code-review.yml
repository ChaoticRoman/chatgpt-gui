name: Code Review

on:
  pull_request:
    branches: [ main ]

jobs:
  check-skip:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check skip-review in PR description
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -iqE 'skip[-_ ]review'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  code-review:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: ChaoticRoman/gpt-code-review-action@v12
        with:
          openai-key: ${{ secrets.OPENAI_API_KEY }}
          max-length: 50000
          model: gpt-5.2-codex
