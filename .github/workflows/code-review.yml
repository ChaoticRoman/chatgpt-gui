name: Code Review

on:
  pull_request:
    branches: [ main ]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: ChaoticRoman/gpt-code-review-action@v10
        with:
          openai-key: ${{ secrets.OPENAI_API_KEY }}
          max-length: 50000
