name: E2E Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
      skip_e2e: ${{ steps.skip_check.outputs.detected }}
    steps:
      - name: Check for relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            should_run:
              - 'cli.py'
              - 'core.py'
              - 'tests/**'
              - '.github/workflows/e2e-tests.yml'

      - name: Check skip-e2e in PR description
        id: skip_check
        uses: ChaoticRoman/phrase-in-pr-description@v2
        with:
          phrase: 'skip[ -_]e2e'


  e2e:
    needs: changes
    if: needs.changes.outputs.should_run == 'true' && needs.changes.outputs.skip_e2e != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install openai rich pytest pytest-xdist

      - name: Run E2E tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: make xtest
