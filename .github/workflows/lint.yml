name: Ruff

on:
  pull_request:
    branches: [ main ]

jobs:
  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check -v .
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: format --diff .
