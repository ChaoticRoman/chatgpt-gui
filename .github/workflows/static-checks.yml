name: Static Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  imports-and-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install openai rich tkinterweb mistletoe pygments pyright

      - name: Import check
        run: make importcheck

      - name: Type check
        run: make typecheck
